spring.application.name=healthcare
spring.config.import=optional:classpath:application-secret.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# JWT (invite token signing)
invite.token.secret=ttamtam-local-secret-key-change-in-production
invite.token.expiry-hours=24

app.invite-web-base-url=https://ttam-ttam-web.vercel.app

# JWT
jwt.secret=ttamtam-default-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration-days=30
