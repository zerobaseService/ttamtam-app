spring.application.name=healthcare
spring.profiles.active=dev
spring.config.import=optional:classpath:application-secret.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Upload
app.upload.dir=./uploads/journal-images
app.upload.url-prefix=/static/journal-images
app.upload.base-url=http://localhost:8080

# JWT (invite token signing)
invite.token.secret=ttamtam-local-secret-key-change-in-production
invite.token.expiry-hours=24

# JWT
jwt.secret=ttamtam-default-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration-days=30
