spring.application.name=healthcare
spring.profiles.active=dev
spring.config.import=optional:classpath:application-secret.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Upload
app.upload.dir=./uploads/journal-images
app.upload.url-prefix=/static/journal-images
app.upload.base-url=http://localhost:8080

# JWT (invite token signing)
invite.token.secret=${INVITE_TOKEN_SECRET:ttamtam-local-dev-only-do-not-use-in-prod}
invite.token.expiry-hours=24

app.invite-web-base-url=https://ttam-ttam-web.vercel.app

# JWT
jwt.secret=${JWT_SECRET:ttamtam-local-dev-only-do-not-use-in-prod-must-be-256-bits}
jwt.expiration-days=30

# gzip compression for JSON responses
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024
