spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? ? validate? ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

app.upload.dir=/app/uploads/journal-images
app.upload.url-prefix=/static/journal-images
app.upload.base-url=https://ttamtam.duckdns.org

jwt.secret=${JWT_SECRET}
jwt.expiration-days=30
invite.token.secret=${INVITE_TOKEN_SECRET}
invite.token.expiry-hours=24
app.invite-web-base-url=${INVITE_WEB_BASE_URL:https://ttam-ttam-web.vercel.app}

server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024
server.forward-headers-strategy=native

logging.level.root=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=/app/logs/healthcare.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
